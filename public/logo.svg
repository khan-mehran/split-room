<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="hex">
      <polygon points="50,4 90,27 90,73 50,96 10,73 10,27"/>
    </clipPath>
    <linearGradient id="teal-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3AADA8"/>
      <stop offset="100%" stop-color="#227A76"/>
    </linearGradient>
    <linearGradient id="peach-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0A97C"/>
      <stop offset="100%" stop-color="#D4784C"/>
    </linearGradient>
  </defs>

  <!-- Both halves inside hexagon clip -->
  <g clip-path="url(#hex)">
    <!-- Teal left background -->
    <rect width="100" height="100" fill="url(#teal-g)"/>

    <!-- Peach right half — diagonal cut -->
    <polygon points="66,0 100,0 100,100 34,100" fill="url(#peach-g)"/>

    <!-- Left inner pentagon highlight -->
    <polygon points="30,21 46,37 40,63 20,63 14,37" fill="white" opacity="0.18"/>

    <!-- Dollar sign -->
    <text x="30" y="57" font-size="26" fill="white" text-anchor="middle"
          font-weight="700" font-family="Arial,sans-serif">$</text>

    <!-- Right inner pentagon highlight -->
    <polygon points="70,21 86,37 80,63 60,63 54,37" fill="white" opacity="0.18"/>

    <!-- Person 2 (back, slightly right) -->
    <circle cx="74" cy="36" r="6" fill="white" opacity="0.6"/>
    <path d="M63,66 C63,53 85,53 85,66" fill="white" opacity="0.6"/>

    <!-- Person 1 (front, slightly left) -->
    <circle cx="66" cy="38" r="7" fill="white"/>
    <path d="M55,66 C55,52 77,52 77,66" fill="white"/>
  </g>

  <!-- Hexagon border -->
  <polygon points="50,4 90,27 90,73 50,96 10,73 10,27"
           fill="none" stroke="#1E3D5C" stroke-width="5"/>

  <!-- Diagonal divider line -->
  <line x1="66" y1="3" x2="34" y2="97"
        stroke="#1E3D5C" stroke-width="5" stroke-linecap="round"/>
</svg>
